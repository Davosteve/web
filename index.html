<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>David Estevez</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Cinzel', serif;
    }

    html, body{
      width:100%;
      height:100%;
      background:#0e0e0e;
      color:white;
      overflow:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    /* WRAPPER */
    #wrapper{
      position:relative;
      width:100%;
      height:100vh;
      overflow:hidden;
    }

    /* HEADER */
    #header{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 30px;
      background:rgba(0,0,0,0.6);
      backdrop-filter:blur(10px);
      z-index:1000;
    }

    #header h1{
      font-size:18px;
      font-weight:600;
    }

    #header-menu{
      list-style:none;
      display:flex;
      gap:20px;
      align-items:center;
    }

    #header-menu a{
      opacity:0.6;
      cursor:pointer;
      transition:0.25s ease;
    }

    #header-menu a:hover,
    #header-menu a.active{
      opacity:1;
    }

    #social-menu{
      display:flex;
      gap:12px;
      align-items:center;
    }

    #social-menu img{
      width:22px;
      height:22px;
      display:block;
      opacity:0.8;
      transition:0.25s ease;
    }

    #social-menu img:hover{
      opacity:1;
      transform:scale(1.05);
    }

    /* SECCIONES SPA */
    .section{
      position:absolute;
      inset:0;
      padding-top:80px;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      opacity:0;
      pointer-events:none;
      transform:translateY(12px);
      transition:opacity 0.45s ease, transform 0.45s ease;
      z-index:1;
    }

    .section.active{
      opacity:1;
      pointer-events:auto;
      transform:translateY(0);
      z-index:2;
    }

    /* MACRO */
    .gallery{
      width:90%;
      max-width:1100px;
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(160px, 1fr));
      gap:10px;
      align-items:start;
    }

    .gallery-item{
      position:relative;
      overflow:hidden;
      border-radius:0;
    }

    .gallery-item img{
      width:100%;
      height:170px;
      object-fit:cover;
      cursor:pointer;
      transition:transform 0.3s ease, opacity 0.3s ease;
      display:block;
    }

    .gallery-item img:hover{
      transform:scale(1.05);
      opacity:0.95;
    }

    /* ABOUT / CONTACT */
    .section-content{
      width:90%;
      max-width:700px;
      padding:20px;
    }

    .section-content h2{
      font-size:34px;
      margin-bottom:12px;
    }

    .section-content p{
      font-size:16px;
      line-height:1.7;
      opacity:0.85;
    }

    /* FOOTER */
    #footer{
      position:fixed;
      bottom:0;
      left:0;
      width:100%;
      padding:14px 20px;
      text-align:center;
      font-size:13px;
      opacity:0.6;
      z-index:1000;
      pointer-events:none;
    }

    /* LIGHTBOX */
    #lightbox{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.92);
      display:none;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      z-index:2000;
      padding:20px;
    }

    #lightbox.active{
      display:flex;
    }

    #lightbox-img{
      max-width:92vw;
      max-height:78vh;
      object-fit:contain;
      box-shadow:0 10px 40px rgba(0,0,0,0.5);
    }

    #lightbox-caption{
      margin-top:12px;
      font-size:16px;
      opacity:0.9;
    }

    #close-btn{
      position:absolute;
      top:18px;
      right:26px;
      font-size:34px;
      cursor:pointer;
      line-height:1;
      user-select:none;
      opacity:0.85;
      transition:0.25s ease;
    }

    #close-btn:hover{
      opacity:1;
      transform:scale(1.08);
    }

    @media (max-width: 700px){
      #header{
        padding:12px 16px;
      }

      #header h1{
        font-size:16px;
      }

      #header-menu{
        gap:14px;
        font-size:14px;
      }

      .gallery{
        grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));
      }

      .gallery-item img{
        height:150px;
      }

      .section-content h2{
        font-size:28px;
      }
    }
  </style>
</head>

<body>
  <div id="wrapper">
    <!-- HEADER -->
    <div id="header">
      <h1>David Estevez</h1>

      <ul id="header-menu">
        <li><a href="#macro" class="nav-link active" data-section="macro">Macro</a></li>
        <li><a href="#about" class="nav-link" data-section="about">Sobre mí</a></li>
        <li><a href="#contact" class="nav-link" data-section="contact">Contacto</a></li>
      </ul>

      <div id="social-menu">
        <a href="#" aria-label="Instagram"><img src="images/insta.png" alt="Instagram"></a>
        <a href="#" aria-label="Twitter"><img src="images/twitter.png" alt="Twitter"></a>
      </div>
    </div>

    <!-- MACRO -->
    <div id="macro" class="section active">
      <div class="gallery">
        <div class="gallery-item">
          <img src="Mexigonusahh.jpg" data-title="Mexigonus sp" alt="Mexigonus sp">
        </div>

        <div class="gallery-item">
          <img src="Ceranbycidaei ig-2.jpg" data-title="Cerambycidae" alt="Cerambycidae">
        </div>

        <div class="gallery-item">
          <img src="3.jpg" data-title="Misumenops" alt="Misumenops">
        </div>

        <div class="gallery-item">
          <img src="4.jpg" data-title="Tegenaria domestica" alt="Tegenaria domestica">
        </div>

        <div class="gallery-item">
          <img src="2.jpg" data-title="Menemerus bivittatus" alt="Menemerus bivittatus">
        </div>

        <div class="gallery-item">
          <img src="1.jpg" data-title="Corythalia spiralis" alt="Corythalia spiralis">
        </div>
      </div>
    </div>

    <!-- ABOUT -->
    <div id="about" class="section">
      <div class="section-content">
        <h2>Sobre mí</h2>
        <p>Fotógrafo macro y biólogo enfocado en artrópodos y comportamiento.</p>
      </div>
    </div>

    <!-- CONTACT -->
    <div id="contact" class="section">
      <div class="section-content">
        <h2>Contacto</h2>
        <p>Instagram / correo / redes</p>
      </div>
    </div>

    <!-- FOOTER -->
    <div id="footer">
      © 2026 David Estevez
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div id="lightbox" aria-hidden="true">
    <span id="close-btn">&times;</span>
    <img id="lightbox-img" alt="Imagen ampliada">
    <p id="lightbox-caption"></p>
  </div>

  <script>
    const sections = document.querySelectorAll('.section');
    const navLinks = document.querySelectorAll('.nav-link');

    function showSection(id) {
      sections.forEach(section => section.classList.remove('active'));
      navLinks.forEach(link => link.classList.remove('active'));

      const target = document.getElementById(id);
      if (target) target.classList.add('active');

      const activeLink = document.querySelector(`.nav-link[data-section="${id}"]`);
      if (activeLink) activeLink.classList.add('active');
    }

    function handleHashChange() {
      const hash = window.location.hash.replace('#', '');
      if (hash && document.getElementById(hash)) {
        showSection(hash);
      } else {
        showSection('macro');
      }
    }

    navLinks.forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const section = link.dataset.section;
        window.location.hash = section;
      });
    });

    window.addEventListener('hashchange', handleHashChange);

    // LIGHTBOX
    const imgs = document.querySelectorAll('.gallery img');
    const lightbox = document.getElementById('lightbox');
    const lightImg = document.getElementById('lightbox-img');
    const lightCaption = document.getElementById('lightbox-caption');
    const closeBtn = document.getElementById('close-btn');

    imgs.forEach(img => {
      img.addEventListener('click', () => {
        lightImg.src = img.src;
        lightCaption.textContent = img.dataset.title || '';
        lightbox.classList.add('active');
        lightbox.setAttribute('aria-hidden', 'false');
      });
    });

    function closeLightbox() {
      lightbox.classList.remove('active');
      lightbox.setAttribute('aria-hidden', 'true');
      lightImg.src = '';
      lightCaption.textContent = '';
    }

    closeBtn.addEventListener('click', closeLightbox);

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLightbox();
    });

    // Inicialización
    handleHashChange();
  </script>
</body>
</html>
